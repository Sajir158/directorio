<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monitoreo Eléctrico</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f8;
    color:#222;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
    gap:20px;
}

.header h1{
    font-size:32px;
    font-weight:600;
}

.status{
    display:flex;
    align-items:center;
    gap:12px;
    background:white;
    padding:12px 18px;
    border-radius:10px;
    border:1px solid #ddd;
}

.led{
    width:16px;
    height:16px;
    border-radius:50%;
    background:red;
}

.card{
    background:white;
    border-radius:12px;
    padding:25px;
    border:1px solid #ddd;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.buttons button{
    border:none;
    background:#e5e7eb;
    color:#222;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

.buttons button:hover{
    background:#d1d5db;
}

.buttons .active{
    background:#2563eb;
    color:white;
}

.value{
    margin-top:20px;
    font-size:18px;
    font-weight:500;
}

canvas{
    width:100% !important;
    height:450px !important;
}

@media(max-width:700px){

    body{
        padding:15px;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
    }

}

</style>

</head>
<body>

<div class="container">

    <div class="header">

        <h1>Monitoreo Eléctrico</h1>

        <div class="status">

            <div class="led" id="led"></div>

            <span id="estado">
                Sistema apagado
            </span>

        </div>

    </div>

    <div class="card">

        <div class="top">

            <h2 id="tituloGrafica">
                Voltaje
            </h2>

            <div class="buttons">

                <button 
                    id="btnVoltaje"
                    class="active"
                    onclick="cambiarVariable('voltaje')">

                    Voltaje

                </button>

                <button 
                    id="btnCorriente"
                    onclick="cambiarVariable('corriente')">

                    Corriente

                </button>

                <button 
                    id="btnPotencia"
                    onclick="cambiarVariable('potencia')">

                    Potencia

                </button>

            </div>

        </div>

        <canvas id="grafica"></canvas>

        <div class="value">

            Valor actual:
            <span id="valorActual">
                0
            </span>

        </div>

    </div>

</div>

<script>

let variableActual = "voltaje";

const history = {

    time: [],

    voltaje: [],

    corriente: [],

    potencia: []

};

const ctx = document
.getElementById("grafica")
.getContext("2d");

const chart = new Chart(ctx, {

    type: "line",

    data: {

        labels: [],

        datasets: [{

            label: "Voltaje",

            data: [],

            borderColor: "#2563eb",

            backgroundColor: "rgba(37,99,235,0.1)",

            borderWidth: 2,

            tension: 0.3,

            fill: true

        }]
    },

    options: {

        responsive:true,

        maintainAspectRatio:false,

        plugins:{

            legend:{
                display:true
            }

        },

        scales:{

            x:{
                grid:{
                    color:"#eee"
                }
            },

            y:{
                grid:{
                    color:"#eee"
                }
            }

        }

    }

});

function cambiarVariable(variable){

    variableActual = variable;

    document
    .getElementById("tituloGrafica")
    .innerHTML =
    variable.charAt(0).toUpperCase() +
    variable.slice(1);

    document
    .getElementById("btnVoltaje")
    .classList.remove("active");

    document
    .getElementById("btnCorriente")
    .classList.remove("active");

    document
    .getElementById("btnPotencia")
    .classList.remove("active");

    if(variable === "voltaje"){

        document
        .getElementById("btnVoltaje")
        .classList.add("active");

    }

    if(variable === "corriente"){

        document
        .getElementById("btnCorriente")
        .classList.add("active");

    }

    if(variable === "potencia"){

        document
        .getElementById("btnPotencia")
        .classList.add("active");

    }

    actualizarGrafica();

}

function actualizarGrafica(){

    chart.data.labels = history.time;

    chart.data.datasets[0].data =
        history[variableActual];

    chart.data.datasets[0].label =
        variableActual;

    chart.update();

    const datos = history[variableActual];

    if(datos.length > 0){

        const ultimo =
            datos[datos.length - 1];

        document
        .getElementById("valorActual")
        .innerHTML = ultimo;

        // ===== LED =====

        if(variableActual === "potencia"){

            if(ultimo > 0){

                document
                .getElementById("led")
                .style.background = "green";

                document
                .getElementById("estado")
                .innerHTML =
                "Sistema operando";

            }else{

                document
                .getElementById("led")
                .style.background = "red";

                document
                .getElementById("estado")
                .innerHTML =
                "Sistema apagado";

            }

        }

    }

}

async function obtenerDatos(){

    try{

        const response =
        await fetch("/history");

        const data =
        await response.json();

        history.time = data.time;
        history.voltaje = data.voltaje || [];
        history.corriente = data.corriente || [];
        history.potencia = data.potencia || [];

        actualizarGrafica();

    }catch(error){

        console.log(error);

    }

}

setInterval(obtenerDatos, 1000);

obtenerDatos();

</script>

</body>
</html>
